<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Wordle Solver">
<meta name="theme-color" content="#121213">
<meta name="description" content="Algorithmic Wordle solver — works offline">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Wordle Solver</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
 background: #121213;
 color: #fff;
 font-family: 'Courier New', Courier, monospace;
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 align-items: center;
 padding: 14px 16px 40px;
}

.eyebrow { font-size: 11px; letter-spacing: 6px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
h1 { font-size: clamp(22px, 5vw, 30px); font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 2px; }
.word-count { font-size: 13px; color: #aaa; letter-spacing: 1px; margin-bottom: 14px; }

.instructions {
 background: #1a1a1b; border: 1px solid #2a2a2c; border-radius: 10px;
 padding: 12px 16px; margin-bottom: 16px; width: 100%; max-width: 340px;
 font-size: 14px; color: #ccc; line-height: 1.75;
}
.instructions .lbl { color: #fff; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
.color-legend { display: flex; gap: 8px; align-items: center; margin: 4px 0; flex-wrap: wrap; }
.pip { border-radius: 3px; padding: 2px 8px; font-size: 12px; color: #fff; display: inline-block; }
.pip.gray   { background: #555558; }
.pip.yellow { background: #b59f3b; }
.pip.green  { background: #538d4e; }
.arr { color: #aaa; font-size: 13px; }

/* ── Tile row ── */
.tile-row { display: flex; gap: 8px; margin-bottom: 6px; }

.tile {
 width: 56px; height: 56px; border-radius: 7px;
 border: 2px solid #565758; background: #3a3a3c;
 display: flex; align-items: center; justify-content: center;
 position: relative; flex-shrink: 0;
 transition: background 0.12s, border-color 0.12s;
 /* iOS: ensure touch events reach the tile not just the input */
 touch-action: manipulation;
}
.tile.g  { background: #538d4e; border-color: #538d4e; }
.tile.y  { background: #b59f3b; border-color: #b59f3b; }
.tile.gr { background: #555558; border-color: #555558; }

/*
 Key iOS fix: we use a hidden real input for each tile but display
 a visible letter div on top. The input is invisible but focusable.
*/
.tile input {
 position: absolute;
 inset: 0;
 width: 100%;
 height: 100%;
 opacity: 0;           /* invisible but present and focusable */
 border: none;
 outline: none;
 background: transparent;
 font-size: 16px;      /* prevents iOS zoom on focus */
 cursor: pointer;
 -webkit-appearance: none;
 border-radius: 0;
 caret-color: transparent;
 color: transparent;
 z-index: 2;
}

.tile-letter {
 position: absolute;
 inset: 0;
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 26px;
 font-weight: 900;
 color: #fff;
 text-transform: uppercase;
 pointer-events: none;
 z-index: 1;
 /* blinking cursor effect when empty and focused */
}
.tile.focused .tile-letter::after {
 content: '|';
 opacity: 1;
 animation: blink 1s step-end infinite;
}
.tile.focused.has-letter .tile-letter::after { display: none; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.tap-hint {
 font-size: 13px; color: #bbb; letter-spacing: 1px;
 text-transform: uppercase; margin-bottom: 14px; height: 18px;
 text-align: center;
}

/* ── Buttons ── */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }

button {
 font-family: inherit; font-size: 14px; font-weight: 700;
 letter-spacing: 2px; text-transform: uppercase;
 border: none; border-radius: 7px; padding: 12px 20px;
 cursor: pointer;
 /* iOS: prevent double-tap zoom and ensure touch events fire */
 touch-action: manipulation;
 -webkit-appearance: none;
 user-select: none;
 -webkit-user-select: none;
}
button:active { opacity: 0.7; }

#btn-add        { background: #1c1c1d; color: #666; }
#btn-add.active { background: #538d4e; color: #fff; }
#btn-solve      { background: #b59f3b; color: #fff; display: none; }
#btn-reset      { background: transparent; color: #aaa; border: 1px solid #555; display: none; }

/* ── Guesses ── */
#guesses-sec { width: 100%; max-width: 340px; margin-bottom: 24px; display: none; }
.sec-label { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
.sec-label.g   { color: #6abf69; }
.sec-label.y   { color: #d4b84a; }
.sec-label.dim { color: #aaa; }

.guess-row { display: flex; gap: 5px; margin-bottom: 7px; align-items: center; }
.mt {
 width: 42px; height: 42px; border-radius: 5px;
 display: flex; align-items: center; justify-content: center;
 font-size: 20px; font-weight: 900; text-transform: uppercase;
 color: #fff; flex-shrink: 0;
}
.mt.g  { background: #538d4e; }
.mt.y  { background: #b59f3b; }
.mt.gr { background: #555558; }
.mt.e  { background: #3a3a3c; }

.rm-btn {
 background: transparent; border: none; color: #aaa;
 font-size: 26px; padding: 0 8px; cursor: pointer;
 touch-action: manipulation; -webkit-appearance: none;
 font-weight: 300; line-height: 1;
 user-select: none; -webkit-user-select: none;
}

/* ── Results ── */
#results-sec { width: 100%; max-width: 340px; }
.res-group { margin-bottom: 22px; }
.res-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.match-ct { font-size: 12px; color: #aaa; }
.word-grid { display: flex; flex-wrap: wrap; gap: 7px; }

.chip {
 border-radius: 5px; padding: 7px 10px;
 font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
 display: inline-flex; align-items: center; gap: 6px;
}
.chip.common     { background: #1a1a1b; border: 1px solid #3a3a3a; color: #ddd; }
.chip.common.top { background: #1b2e1b; border-color: #538d4e; color: #7dd87a; }
.chip.rare       { background: #1c1a10; border: 1px solid #3a3218; color: #c9a840; }
.star { font-size: 10px; color: #7dd87a; letter-spacing: 0; }
.no-match { font-size: 13px; color: #e74c3c; }
.rem-count {
 font-size: 11px; font-weight: 600; letter-spacing: 0;
 color: #555; background: #0d0d0e;
 border-radius: 3px; padding: 1px 5px;
 min-width: 20px; text-align: center; flex-shrink: 0;
}
.chip.common.top .rem-count { color: #4a8a49; background: #0a130a; }

@media (min-width: 500px) {
 .tile { width: 62px; height: 62px; }
 .tile-letter { font-size: 28px; }
}
</style>
</head>

<h1>Wordle Solver</h1>
<div class="word-count" id="wc"></div>

<div class="instructions">
 <div class="lbl">HOW TO USE</div>

<!-- Tiles -->

 <div class="tile" id="t2"><input id="i2" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><div class="tile-letter" id="l2"></div></div>
 <div class="tile" id="t3"><input id="i3" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><div class="tile-letter" id="l3"></div></div>
 <div class="tile" id="t4"><input id="i4" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><div class="tile-letter" id="l4"></div></div>
</div>

<div class="tap-hint" id="hint"></div>

<div class="btn-row">

</div>

<div id="guesses-sec">

 <div id="g-list"></div>
</div>

<div id="results-sec"></div>

// ── State ────────────────────────────────────────────────────────────────────
const CYCLE = ['gray','yellow','green'];
let slots = Array(5).fill(null).map(() => ({letter:'', state:'empty'}));
let constraints = [];
let focusedIdx = 0;

// ── DOM helpers ───────────────────────────────────────────────────────────────
const tileEl  = i => document.getElementById('t'+i);
const inputEl = i => document.getElementById('i'+i);
const letterEl= i => document.getElementById('l'+i);

function sc(s){ return s==='green'?'g':s==='yellow'?'y':s==='gray'?'gr':'e'; }

// ── Render ────────────────────────────────────────────────────────────────────
function renderTiles() {
 slots.forEach((s, i) => {
   const tile = tileEl(i);
   // rebuild classes
   tile.className = 'tile';
   if (s.letter) tile.classList.add('has-letter');
   if (s.letter) tile.classList.add(sc(s.state));
   if (i === focusedIdx) tile.classList.add('focused');
   letterEl(i).textContent = s.letter.toUpperCase();
 });
 const any = slots.some(s => s.letter);
 document.getElementById('hint').textContent = any ? 'tap filled tile to cycle colour' : '';
 const addBtn = document.getElementById('btn-add');
 addBtn.className = any ? 'active' : '';
}

function focusTile(i) {
 focusedIdx = i;
 inputEl(i).focus();
 renderTiles();
}

// ── Input handling (iOS-safe) ─────────────────────────────────────────────────
// Strategy: clear input after each keystroke, store letter in our own state.
// This avoids iOS autocomplete/composition issues entirely.
for (let i = 0; i < 5; i++) {
 const inp = inputEl(i);

 inp.addEventListener('focus', () => {
   focusedIdx = i;
   renderTiles();
 });

 inp.addEventListener('blur', () => {
   renderTiles();
 });

 // keydown: handle special keys (Backspace, Enter, arrows)
 inp.addEventListener('keydown', e => {
   if (e.key === 'Backspace' || e.key === 'Delete') {
     e.preventDefault();
     if (slots[i].letter) {
       slots[i].letter = '';
       slots[i].state = 'empty';
       renderTiles();
     } else if (i > 0) {
       slots[i-1].letter = '';
       slots[i-1].state = 'empty';
       focusTile(i-1);
     }
   } else if (e.key === 'Enter') {
     e.preventDefault();
     addGuess();
   } else if (e.key === 'ArrowLeft' && i > 0) {
     focusTile(i-1);
   } else if (e.key === 'ArrowRight' && i < 4) {
     focusTile(i+1);
   }
 });

 // input: fires on every character including on iOS
 inp.addEventListener('input', e => {
   const val = inp.value;
   // extract only alpha chars
   const letters = val.replace(/[^a-zA-Z]/g, '');
   if (!letters) { inp.value = ''; return; }

   const letter = letters[letters.length - 1].toLowerCase();
   slots[i].letter = letter;
   slots[i].state = 'gray'; // default new letter to gray

   // CRITICAL: clear the actual input so next keypress isn't appended
   inp.value = '';

   renderTiles();

   // advance focus
   if (i < 4) {
     focusTile(i + 1);
   }
 });

 // Tile touch: cycle colour (fire on touchend to avoid conflicts with input focus)
 tileEl(i).addEventListener('touchend', e => {
   if (!slots[i].letter) return;
   // only cycle if the touch started and ended on this tile (not a scroll)
   e.preventDefault();
   const cur = slots[i].state === 'empty' ? 'gray' : slots[i].state;
   slots[i].state = CYCLE[(CYCLE.indexOf(cur) + 1) % CYCLE.length];
   renderTiles();
 });

 // Desktop: click to cycle
 tileEl(i).addEventListener('mousedown', e => {
   if (!slots[i].letter) return;
   // only intercept if tile has a letter — let click fall through to input otherwise
   e.preventDefault();
   const cur = slots[i].state === 'empty' ? 'gray' : slots[i].state;
   slots[i].state = CYCLE[(CYCLE.indexOf(cur) + 1) % CYCLE.length];
   renderTiles();
 });
}

// ── Add guess ─────────────────────────────────────────────────────────────────
function addGuess() {
 if (!slots.some(s => s.letter)) return;
 const greens = {}, yellows = [], grays = new Set();
 for (let i = 0; i < 5; i++) {
   const {letter, state} = slots[i];
   if (!letter) continue;
   if (state === 'green') greens[i] = letter;
   else if (state === 'yellow') {
     const ex = yellows.find(y => y.letter === letter);
     if (ex) ex.notAt.push(i); else yellows.push({letter, notAt:[i]});
   } else grays.add(letter);
 }
 constraints.push({slots: slots.map(s => ({...s})), greens, yellows, grays});
 slots = Array(5).fill(null).map(() => ({letter:'', state:'empty'}));
 focusedIdx = 0;
 renderTiles();
 renderGuesses();
 document.getElementById('results-sec').innerHTML = '';
 document.getElementById('btn-solve').style.display = 'inline-block';
 document.getElementById('btn-reset').style.display = 'inline-block';
 document.getElementById('guesses-sec').style.display = 'block';
 setTimeout(() => focusTile(0), 50);
}

// ── Render guesses ─────────────────────────────────────────────────────────────
function renderGuesses() {
 const gl = document.getElementById('g-list');
 gl.innerHTML = '';
 constraints.forEach((c, ci) => {
   const row = document.createElement('div');
   row.className = 'guess-row';
   c.slots.forEach(s => {
     const mt = document.createElement('div');
     mt.className = 'mt ' + sc(s.state);
     mt.textContent = s.letter.toUpperCase();
     row.appendChild(mt);
   });
   const rb = document.createElement('button');
   rb.className = 'rm-btn';
   rb.textContent = '×';
   rb.addEventListener('click', () => {
     constraints.splice(ci, 1);
     renderGuesses();
     document.getElementById('results-sec').innerHTML = '';
     if (!constraints.length) {
       document.getElementById('btn-solve').style.display = 'none';
       document.getElementById('btn-reset').style.display = 'none';
       document.getElementById('guesses-sec').style.display = 'none';
     }
   });
   row.appendChild(rb);
   gl.appendChild(row);
 });
}

// ── Solve ──────────────────────────────────────────────────────────────────────
function wordOk(word) {
 for (const {greens, yellows, grays} of constraints) {
   // Green: letter must be at exact position
   for (let i = 0; i < 5; i++) if (greens[i] && word[i] !== greens[i]) return false;

   // Yellow: letter must appear in word, but not at the excluded positions
   for (const {letter, notAt} of yellows) {
     if (!word.includes(letter)) return false;
     if (notAt.some(p => word[p] === letter)) return false;
   }

   // Gray: for each gray letter, work out the exact confirmed count of that
   // letter (from greens + yellows). The word must not contain MORE than that
   // confirmed count. If confirmed count is 0, the word must not contain it at all.
   for (const l of grays) {
     const confirmedCount =
       Object.values(greens).filter(g => g === l).length +
       yellows.filter(y => y.letter === l).length;
     const wordCount = word.split('').filter(c => c === l).length;
     if (wordCount > confirmedCount) return false;
   }
 }
 return true;
}

function chip(word, cls, top) {
 const d = document.createElement('div');
 d.className = 'chip ' + cls + (top ? ' top' : '');
 d.textContent = word.toUpperCase();
 if (top) { const s = document.createElement('span'); s.className='star'; s.textContent='★'; d.appendChild(s); }
 return d;
}

// Collect all letters already known to be in the word (green or yellow
// across all entered constraints). We must never gray these out.
function knownLetters() {
 const known = new Set();
 for (const c of constraints) {
   Object.values(c.greens).forEach(l => known.add(l));
   c.yellows.forEach(y => known.add(y.letter));
 }
 return known;
}

// If this word is wrong, all other pool words remain as possibilities.
function remainingIfWrong(guessWord, pool) {
 return pool.length - 1;
}

function solve() {
 const ch = COMMON.filter(wordOk);
 const rh = RARE.filter(wordOk).sort();
 const rs = document.getElementById('results-sec');
 rs.innerHTML = '';

 // Common — score each word by how many remain if it's wrong, sort ascending
 const scored = ch.map(w => ({ w, rem: remainingIfWrong(w, ch) }));
 scored.sort((a, b) => a.rem - b.rem || a.w.localeCompare(b.w));

 // Common
 const cg = document.createElement('div'); cg.className = 'res-group';
 const chdr = document.createElement('div'); chdr.className = 'res-header';
 chdr.innerHTML = `<div class="sec-label g">Common words</div><div class="match-ct">${ch.length} match${ch.length!==1?'es':''}</div>`;
 cg.appendChild(chdr);
 if (!scored.length) {
   const nm = document.createElement('div'); nm.className='no-match'; nm.textContent='None — check tile colours'; cg.appendChild(nm);
 } else {
   const gr = document.createElement('div'); gr.className='word-grid';
   scored.forEach(({w, rem}, i) => {
     const d = document.createElement('div');
     d.className = 'chip common' + (i === 0 ? ' top' : '');
     const wordSpan = document.createElement('span');
     wordSpan.textContent = w.toUpperCase();
     d.appendChild(wordSpan);
     if (i === 0) { const s = document.createElement('span'); s.className='star'; s.textContent='★'; d.appendChild(s); }
     const remSpan = document.createElement('span');
     remSpan.className = 'rem-count';
     remSpan.textContent = rem;
     d.appendChild(remSpan);
     gr.appendChild(d);
   });
   cg.appendChild(gr);
 }
 rs.appendChild(cg);

 // Less common
 if (rh.length) {
   const rg = document.createElement('div'); rg.className='res-group';
   const rhdr = document.createElement('div'); rhdr.className='res-header';
   rhdr.innerHTML = `<div class="sec-label y">Less common</div><div class="match-ct">${rh.length} match${rh.length!==1?'es':''}</div>`;
   rg.appendChild(rhdr);
   const gr = document.createElement('div'); gr.className='word-grid';
   rh.forEach(w => gr.appendChild(chip(w,'rare',false)));
   rg.appendChild(gr);
   rs.appendChild(rg);
 }

 if (!ch.length && !rh.length) {
   const nm = document.createElement('div'); nm.className='no-match'; nm.style.marginTop='8px';
   nm.textContent = 'No matches — double-check your tile colours'; rs.appendChild(nm);
 }
}

// ── Reset ──────────────────────────────────────────────────────────────────────
function reset() {
 constraints = [];
 slots = Array(5).fill(null).map(() => ({letter:'', state:'empty'}));
 focusedIdx = 0;
 renderTiles();
 document.getElementById('g-list').innerHTML = '';
 document.getElementById('results-sec').innerHTML = '';
 document.getElementById('guesses-sec').style.display = 'none';
 document.getElementById('btn-solve').style.display = 'none';
 document.getElementById('btn-reset').style.display = 'none';
 setTimeout(() => focusTile(0), 50);
}

// ── Button wiring (touchend for iOS reliability) ───────────────────────────────
function wireBtn(id, fn) {
 const btn = document.getElementById(id);
 btn.addEventListener('touchend', e => { e.preventDefault(); fn(); });
 btn.addEventListener('click', fn);
}
wireBtn('btn-add',   addGuess);
wireBtn('btn-solve', solve);
wireBtn('btn-reset', reset);

// ── Init ───────────────────────────────────────────────────────────────────────
renderTiles();
setTimeout(() => focusTile(0), 100);

// ── Register service worker for offline PWA support ────────────────────────────
if ('serviceWorker' in navigator) {
 window.addEventListener('load', () => {
   navigator.serviceWorker.register('sw.js').catch(() => {});
 });
}
</script>
